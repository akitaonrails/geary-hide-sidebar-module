name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build (e.g. v0.1.0)"
        required: true
        default: ""

permissions:
  contents: write

jobs:
  # Gate the release on a green build/test of the tagged tree.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install GTK3 dev headers + Xvfb
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev xvfb
      - name: Build
        run: make
      - name: Test
        run: make test

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Generate release body
        env:
          TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          # -Fxv: fixed-string, whole-line, inverted — robust against the
          # dots in version tags like v0.1.0.
          PREV_TAG=$(git tag --sort=-v:refname | grep -Fxv "$TAG" | head -1 || true)
          {
            echo "## Install (Arch / AUR)"
            echo
            echo '```bash'
            echo "yay -S geary-hide-sidebar"
            echo '```'
            echo
            echo "Builds the GTK module from source and patches Geary's"
            echo "launcher + D-Bus service to load it via GTK_MODULES. Toggle"
            echo "the sidebar with Ctrl+Shift+M. Removing the package restores"
            echo "Geary's launchers byte-for-byte."
            if [ -n "$PREV_TAG" ]; then
              echo
              echo "**Full diff**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
            fi
          } > body.md

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file body.md
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" --notes-file body.md --latest
          fi

  publish-aur:
    needs: [test, release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.ref != ''
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      # Pin the real source checksum and sync pkgver to the tag, so the AUR
      # PKGBUILD ships a verified hash instead of the in-tree SKIP placeholder.
      - name: Pin sha256 + pkgver in PKGBUILD
        env:
          TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          SRC_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          SRC_SHA=$(curl -fsSL "$SRC_URL" | sha256sum | awk '{print $1}')
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" packaging/aur/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('$SRC_SHA')/" packaging/aur/PKGBUILD
          echo "Pinned $SRC_URL -> $SRC_SHA"

      - name: Check AUR_SSH_KEY presence
        id: aur_key
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "set=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping AUR push — no AUR_SSH_KEY secret set"
          else
            echo "set=true" >> "$GITHUB_OUTPUT"
          fi

      # Spins up an Arch container, regenerates .SRCINFO via makepkg, then
      # commits + pushes over SSH. `assets` copies the install scriptlet to
      # the AUR repo root (basename) so `install=` resolves there.
      - name: Publish to AUR
        if: steps.aur_key.outputs.set == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: geary-hide-sidebar
          pkgbuild: ./packaging/aur/PKGBUILD
          assets: |
            ./packaging/aur/geary-hide-sidebar.install
          commit_username: AkitaOnRails (GitHub Actions)
          commit_email: boss@akitaonrails.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "geary-hide-sidebar ${{ inputs.ref || github.ref_name }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          force_push: 'false'
