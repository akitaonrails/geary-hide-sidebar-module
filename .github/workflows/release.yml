name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build (e.g. v0.1.1)"
        required: true
        default: ""

permissions:
  contents: write

jobs:
  # Build + test the tagged tree, and stage the prebuilt tarball for the
  # -bin package. ubuntu-22.04 has an older glibc, so the .so it links is
  # forward-compatible with Arch's newer glibc (the safe build direction).
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install GTK3 dev headers + Xvfb
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev xvfb

      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Stage prebuilt tarball (.so + launcher helpers + docs)
        run: |
          STAGE=$(mktemp -d)
          cp libgeary-hide-sidebar.so \
             packaging/aur/inject.sh \
             packaging/aur/geary-hide-sidebar.hook \
             LICENSE README.md "$STAGE/"
          tar czf geary-hide-sidebar-linux-x86_64.tar.gz -C "$STAGE" .
          sha256sum geary-hide-sidebar-linux-x86_64.tar.gz | awk '{print $1}' \
            > geary-hide-sidebar-linux-x86_64.tar.gz.sha256
          echo "sha256=$(cat geary-hide-sidebar-linux-x86_64.tar.gz.sha256)"

      - uses: actions/upload-artifact@v5
        with:
          name: bin-x86_64
          path: |
            geary-hide-sidebar-linux-x86_64.tar.gz
            geary-hide-sidebar-linux-x86_64.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release body
        env:
          TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          # -Fxv: fixed-string, whole-line, inverted — robust against the
          # dots in version tags like v0.1.1.
          PREV_TAG=$(git tag --sort=-v:refname | grep -Fxv "$TAG" | head -1 || true)
          {
            echo "## Install (Arch / AUR)"
            echo
            echo '```bash'
            echo "yay -S geary-hide-sidebar       # builds from source (any arch)"
            echo "yay -S geary-hide-sidebar-bin   # prebuilt .so (x86_64)"
            echo '```'
            echo
            echo "Patches Geary's launcher + D-Bus service to load the module"
            echo "via GTK_MODULES. Toggle with Ctrl+Shift+M. Removing the"
            echo "package restores Geary's launchers byte-for-byte."
            echo
            echo "## Checksums (SHA256)"
            echo '```'
            for f in artifacts/*.sha256; do
              echo "$(cat "$f")  $(basename "${f%.sha256}")"
            done
            echo '```'
            if [ -n "$PREV_TAG" ]; then
              echo
              echo "**Full diff**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
            fi
          } > body.md

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          # --clobber so workflow_dispatch re-runs overwrite existing assets.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/*.tar.gz artifacts/*.sha256 \
              --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file body.md
          else
            gh release create "$TAG" artifacts/*.tar.gz artifacts/*.sha256 \
              --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes-file body.md --latest
          fi

  publish-aur:
    needs: [build, release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.ref != ''
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      # Pin verified checksums + sync pkgver into both PKGBUILDs, so the AUR
      # packages ship real hashes instead of the in-tree SKIP placeholders.
      - name: Pin checksums + pkgver
        env:
          TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          VERSION="${TAG#v}"

          # Source package: hash of the GitHub tag archive.
          SRC_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          SRC_SHA=$(curl -fsSL "$SRC_URL" | sha256sum | awk '{print $1}')
          sed -i "s/^pkgver=.*/pkgver=$VERSION/"            packaging/aur/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('$SRC_SHA')/" packaging/aur/PKGBUILD

          # Binary package: hash of the prebuilt release tarball.
          BIN_SHA=$(awk '{print $1}' artifacts/geary-hide-sidebar-linux-x86_64.tar.gz.sha256)
          sed -i "s/^pkgver=.*/pkgver=$VERSION/"                         packaging/aur/PKGBUILD-bin
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('$BIN_SHA')/" packaging/aur/PKGBUILD-bin

          # deploy-aur copies the pkgbuild verbatim (preserving its filename),
          # but each AUR repo tracks a file literally named PKGBUILD — so stage
          # the -bin variant under that name.
          mkdir -p staging/bin
          cp packaging/aur/PKGBUILD-bin staging/bin/PKGBUILD
          echo "src=$SRC_SHA bin=$BIN_SHA"

      - name: Check AUR_SSH_KEY presence
        id: aur_key
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "set=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping AUR push — no AUR_SSH_KEY secret set"
          else
            echo "set=true" >> "$GITHUB_OUTPUT"
          fi

      # Each step spins up an Arch container, regenerates .SRCINFO via makepkg,
      # then commits + pushes over SSH. `assets` copies the install scriptlet to
      # the AUR repo root (basename) so `install=` resolves there.
      - name: Publish geary-hide-sidebar (source) to AUR
        if: steps.aur_key.outputs.set == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: geary-hide-sidebar
          pkgbuild: ./packaging/aur/PKGBUILD
          assets: |
            ./packaging/aur/geary-hide-sidebar.install
          commit_username: AkitaOnRails (GitHub Actions)
          commit_email: boss@akitaonrails.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "geary-hide-sidebar ${{ inputs.ref || github.ref_name }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          force_push: 'false'

      - name: Publish geary-hide-sidebar-bin to AUR
        if: steps.aur_key.outputs.set == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: geary-hide-sidebar-bin
          pkgbuild: ./staging/bin/PKGBUILD
          assets: |
            ./packaging/aur/geary-hide-sidebar.install
          commit_username: AkitaOnRails (GitHub Actions)
          commit_email: boss@akitaonrails.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "geary-hide-sidebar-bin ${{ inputs.ref || github.ref_name }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          force_push: 'false'
