name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install GTK3 dev headers + Xvfb
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev xvfb

      - name: Build module
        run: make

      - name: Run unit tests (headless via xvfb-run)
        run: make test
